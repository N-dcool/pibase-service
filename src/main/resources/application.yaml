spring:
  application:
    name: pibase-api

  datasource:
    url: jdbc:h2:file:./data/pibase-metadata;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        formate_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    user:
      name: admin
      password: admin

management:
  endpoints:
    web:
      exposure:
        include: health,info
    endpoint:
      health:
        show-details: always

pibase:
  public-host: ${PUBLIC_HOST:localhost}
  provisioning:
    default-memory-mb: 128
    default-storage-mb: 100
    default-ttl-hours: 24
    max-databases-per-user: 1
  ports:
    postgresql-min: 5433
    postgresql-max: 5532
    mysql-min: 5533
    mysql-max: 5582
